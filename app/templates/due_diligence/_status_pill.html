{% if status == "Strong" %}
    <span class="status-pill bg-emerald-400/10 text-emerald-300">Strong</span>
{% elif status == "Adequate" %}
    <span class="status-pill bg-sky-400/10 text-sky-300">Adequate</span>
{% elif status == "Weak" %}
    <span class="status-pill bg-amber-400/10 text-amber-300">Weak</span>
{% elif status == "High Risk" %}
    <span class="status-pill bg-red-400/10 text-red-300">High Risk</span>
{% else %}
    <span class="status-pill bg-slate-800 text-slate-300">Insufficient Evidence</span>
{% endif %}
